<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status">Starting...</div>
    <div id="results">
        <textarea id="res_cm" rows="5" cols="80"></textarea><br>
        <textarea id="res_minister" rows="5" cols="80"></textarea><br>
        <textarea id="res_secretary" rows="5" cols="80"></textarea>
    </div>
    <script>
        async function compress(name, path, targetAreaId) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxDim = 800; 
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxDim) { height *= maxDim / width; width = maxDim; }
                    } else {
                        if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/webp', 0.5); // Slightly lower quality to ensure small size
                    document.getElementById(targetAreaId).value = dataUrl;
                    console.log(`FINISHED_${name}`);
                    resolve();
                };
                img.onerror = () => {
                    console.error(`Error loading ${name}`);
                    resolve();
                };
                img.src = path;
            });
        }

        async function run() {
            const div = document.getElementById('status');
            div.innerText = 'Compressing CM...';
            await compress('cm', '../assets/cm_tamil_nadu.webp', 'res_cm');
            div.innerText = 'Compressing Minister...';
            await compress('minister', '../assets/minister_ma.webp', 'res_minister');
            div.innerText = 'Compressing Secretary...';
            await compress('secretary', '../assets/secretary_maws.webp', 'res_secretary');
            div.innerText = 'Finished. Check textareas.';
        }
        
        // Wait a bit to ensure images are accessible if served
        setTimeout(run, 1000);
    </script>
</body>
</html>
